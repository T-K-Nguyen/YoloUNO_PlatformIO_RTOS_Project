<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOT Dashboard 13/3</title>

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
    
<div class="wrapper">
  
    <div class="sidebar">
    <h3 class="logo">
      <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
        <use xlink:href="icons/cpu.svg"/>
      </svg>
      <span>IoT Panel</span>
    </h3>
    <ul>
      <li>
        <a href="index.html">
          <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <use xlink:href="icons/house-door.svg"/>
          </svg>
          <span>Home</span>
        </a>
      </li>
      <li>
        <a href="dashboard.html">
          <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <use xlink:href="icons/speedometer2.svg"/>
          </svg>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a href="wifi.html">
          <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <use xlink:href="icons/wifi.svg"/>
          </svg>
          <span>WiFi Config</span>
        </a>
      </li>
      <li>
        <a href="devices.html">
          <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <use xlink:href="icons/cpu.svg"/>
          </svg>
          <span>Devices</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="content">
    <div class="container">
      <div class="row justify-content-center mt-5">
        <div class="col-md-6">
          <div class="card shadow p-4 text-center">
            <h4 class="mb-4">Control Devices</h4>
            <div class="d-flex justify-content-center gap-4">
              <button id="motor-btn" class="btn btn-lg btn-primary">
                <i class="bi bi-door-open"></i> motor (Pin 10)
              </button>
              <button id="fan-btn" class="btn btn-lg btn-success">
                <i class="bi bi-fan"></i> FAN (Pin 8)
              </button>
            </div>
            <div id="led-status" class="mt-4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/devices.js"></script>
<!-- Bootstrap Icons CDN for lightbulb icon -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</div>
</body>
</html>
