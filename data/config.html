<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESP32 Configuration</title>
    <link href="css/bootstrap.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrapper">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <i class="fa-solid fa-microchip me-2"></i>ESP32 IoT
        </div>
        <ul class="sidebar-nav">
          <li>
            <a href="index.html"
              ><i class="fa-solid fa-chart-pie"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="config.html" class="active"
              ><i class="fa-solid fa-gear"></i> Configuration</a
            >
          </li>
          <li>
            <a href="control.html"
              ><i class="fa-solid fa-sliders"></i> Device Control</a
            >
          </li>
        </ul>
      </aside>

      <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h1 class="page-title mb-0">Configuration</h1>
          <button
            class="btn btn-primary d-md-none"
            id="sidebarToggle"
            title="Toggle Sidebar"
          >
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>

        <div class="row g-4 d-flex align-items-stretch">
          <!-- WiFi Form -->
          <div class="col-lg-6">
            <div class="custom-card">
              <div class="d-flex align-items-center mb-4">
                <div
                  class="icon-shape bg-primary bg-opacity-10 text-primary rounded-circle me-3"
                >
                  <i class="fa-solid fa-wifi fs-4"></i>
                </div>
                <h4 class="mb-0 text-main fw-bold">WiFi Settings</h4>
              </div>
              <form id="wifi-config-form">
                <div class="mb-3">
                  <label for="ssid" class="form-label fw-semibold"
                    >SSID / Tên Mạng</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="ssid"
                    placeholder="Nhập tên WiFi"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label for="password" class="form-label fw-semibold"
                    >Mật khẩu</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="Nhập mật khẩu WiFi"
                    required
                  />
                </div>
                <button
                  type="submit"
                  class="btn btn-primary w-100 mt-2"
                  id="wifi-connect-btn"
                >
                  <i class="fa-solid fa-floppy-disk me-2"></i>Lưu WiFi
                </button>
              </form>
            </div>
          </div>

          <!-- MQTT Form -->
          <div class="col-lg-6">
            <div class="custom-card">
              <div class="d-flex align-items-center mb-4">
                <div
                  class="icon-shape bg-warning bg-opacity-10 text-warning rounded-circle me-3"
                >
                  <i class="fa-solid fa-network-wired fs-4"></i>
                </div>
                <h4 class="mb-0 text-main fw-bold">MQTT Settings</h4>
              </div>
              <form id="mqttForm">
                <div class="mb-3">
                  <label for="mqttServer" class="form-label fw-semibold"
                    >Server / Broker</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="mqttServer"
                    placeholder="VD: mqtt.thinger.io"
                    required
                  />
                </div>
                <div class="row">
                  <div class="col-md-8 mb-3">
                    <label for="mqttToken" class="form-label fw-semibold"
                      >Token / Username</label
                    >
                    <input
                      type="text"
                      class="form-control"
                      id="mqttToken"
                      placeholder="Nhập Token"
                      required
                    />
                  </div>
                  <div class="col-md-4 mb-4">
                    <label for="mqttPort" class="form-label fw-semibold"
                      >Port</label
                    >
                    <input
                      type="number"
                      class="form-control"
                      id="mqttPort"
                      placeholder="1883"
                      required
                    />
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-2">
                  <i class="fa-solid fa-floppy-disk me-2"></i>Lưu MQTT
                </button>
              </form>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="js/bootstrap.bundle.js"></script>
    <script src="js/script.js"></script>
    <script src="js/wifi.js"></script>
  </body>
</html>
