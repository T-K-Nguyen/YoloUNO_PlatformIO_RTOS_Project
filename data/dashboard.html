<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Configuration</title>
<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="wrapper">

    <div class="sidebar">
    <h3 class="logo">
      <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
        <use xlink:href="icons/cpu.svg"/>
      </svg>
      <span>IoT Panel</span>
    </h3>
    <ul>
      <li>
        <a href="index.html">
          <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <use xlink:href="icons/house-door.svg"/>
          </svg>
          <span>Home</span>
        </a>
      </li>
      <li>
        <a href="dashboard.html">
          <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <use xlink:href="icons/speedometer2.svg"/>
          </svg>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a href="wifi.html">
          <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <use xlink:href="icons/wifi.svg"/>
          </svg>
          <span>WiFi Config</span>
        </a>
      </li>
      <li>
        <a href="devices.html">
          <svg class="bi" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
            <use xlink:href="icons/cpu.svg"/>
          </svg>
          <span>Devices</span>
        </a>
      </li>
    </ul>
  </div>

<div class="content">

    <div class="container">
    </div>
    <div class="row justify-content-center mt-5">
        <div class="col-md-4 mb-3">
        <div class="card shadow h-100 text-center border-0">
            <div class="card-body py-4">
            <div class="mb-2">
                <svg width="48" height="48" fill="#ff5722" viewBox="0 0 16 16">
                <use xlink:href="/data/icons/thermometer.svg"/>
                </svg>
            </div>
            <h5 class="card-title mb-2">Nhiệt độ</h5>
            <span id="temperature-value" class="sensor-value temp-color">--</span>
            <span class="sensor-unit">°C</span>
            </div>
        </div>
        </div>
        <div class="col-md-4 mb-3">
        <div class="card shadow h-100 text-center border-0">
            <div class="card-body py-4">
            <div class="mb-2">
                <svg width="48" height="48" fill="#2196f3" viewBox="0 0 16 16">
                <use xlink:href="/data/icons/droplet.svg"/>
                </svg>
            </div>
            <h5 class="card-title mb-2">Độ ẩm</h5>
            <span id="humidity-value" class="sensor-value hum-color">--</span>
            <span class="sensor-unit">%</span>
            </div>
        </div>
        </div>
    </div>



    </div>
</div>







<script src="js/dashboard.js"></script>
<script src="js/wifi.js"></script>


</body>
</html>
